<div class="container">
  <header class="main-header">
    <h1>📚 BookStore <span class="pro-badge">PRO</span></h1>
    <p class="subtitle">Advanced Angular Concepts Demonstration (Day 40)</p>
  </header>

  <!-- Approach 1: Async Pipe Section -->
  <section class="fetching-section">
    <div class="section-header">
      <h2>Approach 1: Using <code>async</code> Pipe</h2>
      <span class="status-tag success">Recommended</span>
    </div>
    
    <div class="books-grid">
      <app-book-item 
        *ngFor="let book of books$ | async" 
        [book]="book">
      </app-book-item>
    </div>
  </section>

  <hr class="divider" />

  <!-- Approach 2: Manual Subscription Section -->
  <section class="fetching-section">
    <div class="section-header">
      <h2>Approach 2: Manual Subscription</h2>
      <span class="status-tag warning">Requires Cleanup</span>
    </div>
    
    <div class="books-grid">
      <app-book-item 
        *ngFor="let book of manualBooks" 
        [book]="book">
      </app-book-item>
    </div>
  </section>
</div>
